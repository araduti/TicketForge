global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerting-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # TODO: Replace with your Alertmanager instance address
            - "alertmanager:9093"

scrape_configs:
  - job_name: "ticketforge"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          environment: "production"
          service: "ticketforge"

  - job_name: "ticketforge-health"
    metrics_path: "/health"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          environment: "production"
          service: "ticketforge"
