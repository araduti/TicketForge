apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketforge
  namespace: ticketforge
  labels:
    app.kubernetes.io/name: ticketforge
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ticketforge.example.com
      secretName: ticketforge-tls
  rules:
    - host: ticketforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticketforge
                port:
                  number: 80
