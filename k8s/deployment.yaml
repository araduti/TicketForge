apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketforge
  namespace: ticketforge
  labels:
    app.kubernetes.io/name: ticketforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ticketforge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ticketforge
    spec:
      containers:
        - name: ticketforge
          image: ghcr.io/araduti/ticketforge:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ticketforge-config
            - secretRef:
                name: ticketforge-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
